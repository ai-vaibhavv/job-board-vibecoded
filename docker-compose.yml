# Usage:
#   cp .env.example .env && edit .env            # DISCORD_WEBHOOK_URL etc.
#   cp config/settings.example.yaml config/settings.yaml
#   cp config/sources.example.yaml config/sources.yaml
#   # put your Colab/vLLM tunnel URL in config/settings.yaml -> llm.colab_base_url
#
#   docker compose up                            # dashboard on http://localhost:7860
#   docker compose up -d                         # same, in the background
#   docker compose --profile scheduler up -d     # also run scheduled searches
#   docker compose run --rm app send-test        # one-off CLI command in the image
#
# ONE container is the whole dashboard: the React SPA and its JSON API are served
# by the same FastAPI process at http://localhost:7860 (the image builds the SPA
# and FastAPI serves it — see the Dockerfile). Browsing needs no LLM; only
# translation and new searches use the Colab tunnel, degrading gracefully when it
# is down. If the tunnel URL changed, edit config/settings.yaml (picked up live —
# no restart needed).

services:
  app:
    build: .
    image: germany-research-job-alerts:latest
    container_name: job-alerts
    restart: unless-stopped

    # Serve the SPA + JSON API from one process. No LLM startup gate.
    command: ["serve", "--host", "0.0.0.0"]

    ports:
      - "7860:7860"

    # Secrets come from .env at runtime; never baked into the image.
    env_file:
      - .env

    environment:
      TZ: Europe/Berlin
      JOB_ALERTS_DATABASE_PATH: /data/jobs.db
      # Set JOB_ALERTS_API_AUTH=user:pass in .env to require HTTP Basic on the
      # write endpoints (publish / run-search / resume) — do this before exposing
      # the dashboard beyond localhost.

    volumes:
      # The database MUST persist: it remembers which jobs were already sent, and
      # holds the translation/hidden state the dashboard writes.
      - jobs-data:/data
      # Config is mounted read-only; the LLM check re-reads it each call, so you
      # can edit llm.colab_base_url without a rebuild or restart.
      - ./config:/app/config:ro

    # Temp/cache writes (routed to /tmp by the image's ENV) go to a RAM-backed
    # tmpfs, so they never fill the Docker overlay disk. Only the persistent DB
    # touches real disk (the named volume).
    tmpfs:
      - /tmp

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: scheduled searches at 08:00 / 18:00. Off by default so the paid
  # Apify source is not run unattended. Enable with `--profile scheduler`.
  scheduler:
    build: .
    image: germany-research-job-alerts:latest
    container_name: job-alerts-scheduler
    restart: unless-stopped
    profiles: ["scheduler"]
    command: ["run-scheduler"]

    env_file:
      - .env
    environment:
      TZ: Europe/Berlin
      JOB_ALERTS_DATABASE_PATH: /data/jobs.db

    volumes:
      - jobs-data:/data
      - ./config:/app/config:ro

    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  jobs-data:
