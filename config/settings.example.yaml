# ---------------------------------------------------------------------------
# Germany Research Job Alerts — main configuration
#
# Copy to config/settings.yaml and edit freely:
#   cp config/settings.example.yaml config/settings.yaml
#
# Secrets do NOT belong here. Webhook URL and API keys live in `.env`.
# ---------------------------------------------------------------------------

search:
  # Only notify about jobs published within this many days.
  #
  # This was 30 and did nothing at all: every one of the 125 stored jobs had no
  # `published_at` (fraunhofer 0/25, search_discovery 0/100), and an undated job
  # falls back to `discovered_at`, which is always "now" for a job we just found.
  # The filter could not fire. It works now because the TUM feed carries real
  # pubDates and enrichment reads dates off the posting page.
  max_age_days: 7
  # Hard cap on candidates pulled from a single source per run.
  max_results_per_source: 100

  # Fetch each thin job's own page before judging it. This is what turns a
  # 160-character search snippet into a real description with a date, a city and
  # a contact — the single change everything downstream depends on.
  enrich: true
  # A description shorter than this means the source handed us a stub.
  enrich_below_chars: 400
  # Whole-stage budget. Overrunning is not an error: whatever finished keeps its
  # data and the rest stay un-enriched, which the pipeline handles.
  enrich_timeout: 240.0
  # Drop a job with no date only when we FETCHED its page and found none.
  # A job we never managed to look at is kept — absence of evidence gathered is
  # not evidence of absence.
  drop_undated_when_enriched: true

locations:
  # When true, every German location is acceptable and the list below is used
  # only for scoring/query expansion, not for filtering jobs out.
  all_germany: true
  include:
    - Berlin
    - Munich
    - München
    - Hamburg
    - Frankfurt
    - Stuttgart
    - Cologne
    - Köln
    - Düsseldorf
    - Bonn
    - Aachen
    - Karlsruhe
    - Darmstadt
    - Heidelberg
    - Mannheim
    - Tübingen
    - Freiburg
    - Dresden
    - Leipzig
    - Jena
    - Potsdam
    - Saarbrücken
    - Erlangen
    - Nuremberg
    - Nürnberg
    - Bremen
    - Hanover
    - Hannover
    - Göttingen
    - Münster
    - Dortmund
    - Bochum
    - Essen
    - Kiel
    - Germany
    - Deutschland
    - Remote within Germany

keywords:
  # A job must match at least one positive keyword to survive filtering.
  #
  # LabScout ships BROAD: these are mostly field-agnostic academic ROLE terms
  # (a "studentische hilfskraft" in physics matches on its role, not its field),
  # so any-field opportunities survive the keyword prefilter and reach the LLM,
  # which makes the final academic-relevance call. For the narrow "core_ai"
  # preset, trim this to the AI/ML-specific *intern lines.
  positive:
    - research assistant
    - research intern
    - research internship
    - student researcher
    - working student research
    - research working student
    - student assistant
    - graduate research assistant
    - undergraduate research assistant
    - teaching assistant
    - tutor
    - lab assistant
    - laboratory assistant
    - wissenschaftliche hilfskraft
    - studentische hilfskraft
    - hiwi
    - werkstudent forschung
    - forschungspraktikum
    - master thesis
    - masterarbeit
    - bachelor thesis
    - bachelorarbeit
    - abschlussarbeit
    - thesis student
    - phd position
    - phd student
    - phd candidate
    - doctoral researcher
    - doctoral candidate
    - promotionsstelle
    - doktorand
    - research fellowship
    - research fellow
    - summer research
    - visiting student
    - research software engineer
    - machine learning intern
    - artificial intelligence intern
    - data science intern
    - robotics intern
    - computer vision intern
    - NLP intern
    - software research intern

  # A match here rejects the job, subject to `phd_requires_explicit_signal`.
  negative:
    - professor
    - professorship
    - postdoc
    - postdoctoral
    - senior
    - principal
    - director
    - head of
    - mandatory completed PhD
    - doctorate required
    - ausbildung
    - full-time permanent senior role

  # Technical areas of interest. Used for scoring, never for rejection.
  #
  # German synonyms matter more than they look. Most German job boards title
  # roles in German ("STUDENTISCHE HILFSKRAFT im Bereich Softwareentwicklung"),
  # and an English-only list scores every one of them as topic-less — which,
  # for list-page sources that expose no description, is the difference between
  # clearing the notify threshold and being silently dropped. Add your own
  # field's German terms here.
  topics:
    - artificial intelligence
    - machine learning
    - deep learning
    - NLP
    - natural language processing
    - computer vision
    - data science
    - robotics
    - software engineering
    - distributed systems
    - cybersecurity
    - human-computer interaction
    - information systems
    # --- German equivalents of the above ---
    - künstliche intelligenz
    - maschinelles lernen
    - maschinelle lernverfahren
    - sprachverarbeitung
    - bildverarbeitung
    - computer vision
    - datenanalyse
    - datenwissenschaft
    - robotik
    - softwareentwicklung
    - softwaretechnik
    - verteilte systeme
    - informatik
    - informationssicherheit
    - it-sicherheit
    - mensch-maschine-interaktion
    - mensch-computer-interaktion
    - interaktionsdesign
    - visualisierung
    - simulation
    - algorithmen

filtering:
  # A passing mention of a PhD ("PhD students also welcome") must not reject a
  # job. When true, PhD-flavoured negative keywords only reject a job if the
  # text shows a *requirement* ("completed PhD required", "Promotion
  # vorausgesetzt"). Turn off for blunt keyword rejection.
  phd_requires_explicit_signal: true
  # Terms that turn a PhD mention into a genuine rejection.
  phd_requirement_signals:
    - completed phd required
    - mandatory completed phd
    - phd is required
    - phd required
    - doctorate required
    - doctoral degree required
    - requires a completed phd
    - must hold a phd
    - abgeschlossene promotion
    - promotion vorausgesetzt
    - promotion erforderlich
  # Match keywords on word boundaries. Prevents "senior" matching "seniority"
  # and, more importantly, keeps short tokens like "hiwi" from matching inside
  # unrelated words.
  word_boundary_matching: true

  # --- LabScout scope ---
  # Broad by default: any academic field and any student/early-career level
  # survives. Volume is held down by the score threshold below, not by narrowing
  # fields. To run the tight "core_ai" preset (AI/ML only, Master's-level, no
  # thesis), flip the three flags to true AND narrow keywords.topics to your
  # fields — see the maintainer's config/settings.yaml for that exact preset.
  require_academic: true          # LabScout is never a generic job board; keep true
  reject_non_core_ai: false       # true = only core AI/ML roles
  reject_master_thesis: false     # true = drop thesis-only postings
  require_masters_suitable: false # true = require Master's-level suitability

scoring:
  # Only jobs scoring at or above this are sent to Discord. 0–100.
  #
  # Was 55, lowered to 45 when `Scorer._location_match` stopped handing out a
  # free `location_match` bonus to any job whose `country` said "Germany" —
  # which, since `country` defaulted to "Germany" and nothing verified it, meant
  # every job. Measured on the 125 stored jobs at the moment of the change:
  #
  #   85/125 lost the free +10
  #   >= 55 after the change   :  2 jobs      (was 11 -> would have muted alerts)
  #   >= 45 after the change   : 11 jobs
  #   >= 55 with the +10 free  : 11 jobs      (i.e. 45 restores the old volume)
  #
  # The two numbers move together. If you re-tune `weights.location_match`, redo
  # that measurement rather than guessing at this one.
  #
  # This is the KEYWORD threshold. LLM-scored jobs use `llm.min_score_to_notify`
  # below and are unaffected — that path overwrites the score wholesale.
  min_score_to_notify: 45
  weights:
    exact_title_match: 30
    research_or_student_keyword_in_title: 20
    topic_in_title: 15
    topic_in_description: 10
    location_match: 10
    masters_explicitly_eligible: 15
    english_speaking_role: 5
    recently_published: 5
    phd_required: -60
    senior_role: -40
    unrelated_discipline: -25
  # A job counts as "recently published" within this many days.
  recent_days: 7
  # Titles that count as an exact target-title match (normalized, case-folded).
  exact_titles:
    - research assistant
    - student research assistant
    - research intern
    - research internship
    - working student research
    - wissenschaftliche hilfskraft
    - studentische hilfskraft
    - hiwi
    - werkstudent forschung
    - master thesis
    - masterarbeit
  # Signals that a Master's student is explicitly welcome.
  masters_signals:
    - master student
    - master's student
    - masterstudent
    - masterand
    - msc student
    - m.sc. student
    - graduate student
    - students enrolled
    - immatrikuliert
    - eingeschriebene studierende
    - enrolled student
  # Disciplines clearly outside the target areas. Costs `unrelated_discipline`.
  unrelated_disciplines:
    - nursing
    - dentistry
    - theology
    - veterinary
    - law firm
    - accounting
    - pflege
    - zahnmedizin
    - theologie

notifications:
  # Max Discord messages' worth of jobs per run. Extra jobs are stored and
  # summarized ("+12 more stored") rather than dropped silently.
  max_per_run: 10
  # Jobs bundled into a single Discord message (Discord's hard cap is 10).
  embeds_per_message: 5
  # Length of the description excerpt inside an embed.
  description_excerpt_chars: 400

http:
  # Sent on every request so site owners can identify this tool.
  user_agent: "GermanyResearchJobAlerts/1.0 (+https://github.com/yourname/germany-research-job-alerts; personal job-search tool)"
  # Seconds. Applied per request and to the whole run.
  request_timeout: 20.0
  total_run_timeout: 600.0
  # Simultaneous requests across all sources.
  max_concurrency: 5
  # Minimum seconds between two requests to the same domain.
  per_domain_delay: 1.5
  max_retries: 3
  # Honour robots.txt. Leave enabled — the spec requires it.
  respect_robots: true
  # Cache fetched pages for this many seconds to avoid re-downloading.
  cache_ttl_seconds: 900

database:
  path: data/jobs.db
  # Delete rejected/low-score jobs after this many days to keep the DB small.
  rejected_retention_days: 60

scheduler:
  timezone: Europe/Berlin
  # 24h clock, Europe/Berlin.
  run_at:
    - "08:00"
    - "18:00"
  # Skip a run if the previous one is still going.
  lock_file: data/scheduler.lock

llm:
  # Use an LLM to judge relevance instead of keyword scoring.
  #
  # WHY: keywords cannot tell "PhD students welcome" from "PhD required", cannot
  # see that a page titled "Studentische Hilfskraft ... Jobs" is a search page
  # rather than a job, and cannot know "Sensordatenfusion" is signal processing
  # unless you listed that exact word. An LLM does all three.
  #
  # SAFETY: this never becomes a dependency. No base URL, a dead tunnel, or a
  # garbled reply -> the keyword scorer takes over automatically and you still
  # get your alerts. Set enabled: false to switch it off entirely.
  enabled: true

  # Only the self-hosted `colab` provider exists. It runs when colab_base_url is
  # set; otherwise the run falls back to keyword scoring.
  providers:
    - colab

  # Self-hosted, OpenAI-compatible model — e.g. Qwen2.5-7B on Google Colab via
  # Ollama, exposed with an ngrok tunnel. See docs/colab-model.md.
  #
  # colab_base_url is the tunnel root WITHOUT the /v1/... path, and it changes
  # every Colab session. Leave empty to run on keyword scoring only. Any auth
  # token goes in .env as COLAB_API_KEY (Ollama needs none).
  colab_base_url: ""
  colab_model: "qwen2.5-8k"

  # Jobs per request. Bigger = fewer calls but a longer prompt (needs a large
  # enough num_ctx on the model) and more lost if one batch fails.
  batch_size: 10

  # --- Pacing. One request at a time suits a single local model. ---
  max_concurrency: 1
  # Seconds to wait BETWEEN requests. This exists for free CLOUD tiers with a
  # per-minute limit; a SELF-HOSTED model has no such limit, and max_concurrency:1
  # already serialises the calls, so pacing here is pure dead time. Keep it ~0 for
  # a local/Colab model; raise it only if you point at a rate-limited hosted API.
  min_request_interval: 0.0

  # Retries after EVERY provider fails transiently (429 / 503 / timeout).
  # Permanent failures (bad API key, malformed request) are never retried.
  max_retries: 2
  retry_base_delay: 20.0

  timeout: 60.0

  # Description characters sent per job. The single biggest lever on token use
  # and therefore on rate limits: 1500 roughly doubles the prompt vs 700.
  max_description_chars: 700

  # Token budget for a reply. 0 = let the server decide. Set this when a
  # self-hosted model returns EMPTY or truncated JSON (its default num_predict is
  # too small, or a reasoning model spent its budget "thinking") — the batch then
  # silently falls back to keyword scoring. 2048 comfortably fits a batch's JSON.
  max_output_tokens: 2048

  # Run the cheap keyword filter first and only send survivors to the LLM.
  # Saves most of your quota. Set false to let the LLM see every candidate
  # (uses far more quota, but can catch jobs the keywords would miss).
  prefilter_with_keywords: true

  # Notify threshold for LLM-scored jobs. Deliberately HIGHER than the keyword
  # threshold (55), because the two scales are not the same scale.
  #
  # The prompt tells the model what each band means, so this maps to it directly:
  #   90-100  ideal student research role in your field
  #   70-89   strong: clearly a student/research role in a relevant field
  #   55-69   "plausible, field unclear or loosely related"  <- noise
  #
  # Measured on a live run at 55, the 55-69 band was entirely off-field:
  # "HiWi in sensorik", "HiWi in laserprozessen", "HiWi in psychologie",
  # "HiWi role in unknown field". 70 cuts exactly that band and keeps the rest.
  # Lower it to 55 if you would rather see more and filter by hand.
  min_score_to_notify: 70

logging:
  level: INFO
  # text | json
  format: text
